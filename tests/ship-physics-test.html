<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ship Physics Tests</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 2em; }
    h1 { color: #4fc3f7; }
    .pass { color: #81c784; }
    .fail { color: #e57373; }
    .label { color: #aaa; }
    .detail { color: #888; font-size: 0.9em; margin-left: 2em; }
  </style>
</head>
<body>
  <h1>Ship Physics Tests</h1>
  <div id="results"></div>

  <script type="module">
    import { Ship } from '../js/ship.js';

    const results = document.getElementById('results');

    function assert(label, condition, details) {
      const el = document.createElement('div');
      el.innerHTML = condition
        ? `<span class="pass">PASS</span> <span class="label">${label}</span>${details ? ' <span class="detail">— ' + details + '</span>' : ''}`
        : `<span class="fail">FAIL</span> <span class="label">${label}</span>${details ? ' <span class="detail">— ' + details + '</span>' : ''}`;
      results.appendChild(el);
    }

    // -------------------------------------------------------------------------
    // Shared constants
    // -------------------------------------------------------------------------
    const mu = 1e6;

    // Mock SOI body — ship position is relative to this body, so body is at origin
    const star = { x: 0, y: 0, mu, radius: 50, mass: mu / 6.674e-11 };

    // Circular orbit parameters
    const r0 = 500;
    const vc = Math.sqrt(mu / r0);          // circular velocity ~= 44.72
    const T0 = 2 * Math.PI * Math.sqrt(r0 * r0 * r0 / mu); // orbital period ~= 70.25 s
    const dt = 0.016;                       // 60 fps timestep

    // Prograde at (r0, 0) going clockwise (vy = -vc) is angle = 0:
    //   thrust formula: vx += sin(0)*T*dt = 0,  vy += -cos(0)*T*dt = -T*dt  (speeds up clockwise)
    // So aimAngle = 0 for prograde when velocity is (0, -vc).
    const progradeAngle = 0;

    function makeInput(overrides) {
      return Object.assign({ aimAngle: progradeAngle, up: false, down: false, left: false, right: false }, overrides);
    }

    function makeCircularShip() {
      const ship = new Ship();
      ship.x = r0;
      ship.y = 0;
      ship.vx = 0;
      ship.vy = -vc;  // clockwise circular orbit
      return ship;
    }

    function dist(ship) {
      return Math.sqrt(ship.x * ship.x + ship.y * ship.y);
    }

    function specificEnergy(ship) {
      const v2 = ship.vx * ship.vx + ship.vy * ship.vy;
      const r = dist(ship);
      return v2 / 2 - mu / r;
    }

    // -------------------------------------------------------------------------
    // TEST 1: Circular orbit stability (100 orbital periods)
    // -------------------------------------------------------------------------
    {
      const ship = makeCircularShip();
      const input = makeInput();
      const steps = Math.ceil(100 * T0 / dt);
      const epsilon0 = specificEnergy(ship);

      for (let i = 0; i < steps; i++) {
        ship.update(dt, input, star);
      }

      const rFinal = dist(ship);
      const epsilonFinal = specificEnergy(ship);
      const rErr = Math.abs(rFinal - r0) / r0;
      const eErr = Math.abs(epsilonFinal - epsilon0) / Math.abs(epsilon0);

      assert(
        'Test 1a: Circular orbit — radius within 1% after 100 orbits',
        rErr < 0.01,
        `r = ${rFinal.toFixed(2)}, err = ${(rErr * 100).toFixed(4)}%`
      );
      assert(
        'Test 1b: Circular orbit — energy within 0.1% after 100 orbits',
        eErr < 0.001,
        `epsilon = ${epsilonFinal.toFixed(4)}, err = ${(eErr * 100).toFixed(5)}%`
      );
    }

    // -------------------------------------------------------------------------
    // TEST 2: Prograde thrust raises apoapsis
    // -------------------------------------------------------------------------
    {
      const ship = makeCircularShip();
      const inputCoast = makeInput();

      // Let orbit settle for a few periods (not strictly needed but matches spec)
      const settleSteps = Math.ceil(3 * T0 / dt);
      for (let i = 0; i < settleSteps; i++) {
        ship.update(dt, inputCoast, star);
      }

      // Prograde thrust burst: 0.5 s at aimAngle = 0
      const thrustSteps = Math.ceil(0.5 / dt);
      const inputThrust = makeInput({ up: true });
      for (let i = 0; i < thrustSteps; i++) {
        ship.update(dt, inputThrust, star);
      }

      // One more coast step so orbit elements are current
      ship.update(dt, inputCoast, star);

      assert(
        'Test 2: Prograde thrust raises apoapsis above initial circular radius',
        ship.orbit.apoapsis > r0,
        `apoapsis = ${ship.orbit.apoapsis.toFixed(2)}, r0 = ${r0}`
      );
    }

    // -------------------------------------------------------------------------
    // TEST 3: Retrograde thrust lowers periapsis
    // -------------------------------------------------------------------------
    {
      const ship = makeCircularShip();
      const inputCoast = makeInput();

      // Retrograde burst: 0.5 s
      const thrustSteps = Math.ceil(0.5 / dt);
      const inputThrust = makeInput({ down: true });
      for (let i = 0; i < thrustSteps; i++) {
        ship.update(dt, inputThrust, star);
      }

      ship.update(dt, inputCoast, star);

      assert(
        'Test 3: Retrograde thrust lowers periapsis below initial circular radius',
        ship.orbit.periapsis < r0,
        `periapsis = ${ship.orbit.periapsis.toFixed(2)}, r0 = ${r0}`
      );
    }

    // -------------------------------------------------------------------------
    // TEST 4: Zero fuel prevents thrust
    // -------------------------------------------------------------------------
    {
      const ship = makeCircularShip();
      ship.fuel = 0;

      // Record initial velocity
      const vx0 = ship.vx;
      const vy0 = ship.vy;

      // Compute gravity-only prediction for one step manually
      // Gravity at (r0, 0): gx = -mu/r0^2, gy = 0
      const gx = -mu / (r0 * r0);
      const gy = 0;
      const vxExpected = vx0 + gx * dt;
      const vyExpected = vy0 + gy * dt;

      const inputThrust = makeInput({ up: true });
      ship.update(dt, inputThrust, star);

      const vxDiff = Math.abs(ship.vx - vxExpected);
      const vyDiff = Math.abs(ship.vy - vyExpected);
      const tol = 1e-10;

      assert(
        'Test 4: Zero fuel — velocity matches gravity-only prediction (no thrust applied)',
        vxDiff < tol && vyDiff < tol,
        `dvx = ${vxDiff.toExponential(3)}, dvy = ${vyDiff.toExponential(3)}`
      );
    }

    // -------------------------------------------------------------------------
    // TEST 5: Energy conservation over 10 orbital periods
    // -------------------------------------------------------------------------
    {
      const ship = makeCircularShip();
      const input = makeInput();
      const epsilon0 = specificEnergy(ship);

      const stepsPerOrbit = Math.ceil(T0 / dt);
      let maxDeviation = 0;

      for (let orbit = 0; orbit < 10; orbit++) {
        for (let i = 0; i < stepsPerOrbit; i++) {
          ship.update(dt, input, star);
        }
        const eps = specificEnergy(ship);
        const dev = Math.abs(eps - epsilon0) / Math.abs(epsilon0);
        if (dev > maxDeviation) maxDeviation = dev;
      }

      assert(
        'Test 5: Energy conservation — max deviation < 0.1% over 10 orbits',
        maxDeviation < 0.001,
        `max deviation = ${(maxDeviation * 100).toFixed(5)}%`
      );
    }
  </script>
</body>
</html>
