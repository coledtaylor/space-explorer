<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="ui-overlay">
    <div id="hud">
      <div id="hud-left">
        <span id="location-display">Location: Sol System</span>
        <span id="coords-display">x: 0 y: 0</span>
      </div>
      <div id="hud-right">
        <span id="fuel-display">Fuel: 100%</span>
        <span id="speed-display">Speed: 0</span>
      </div>
    </div>
    <div id="minimap">
      <canvas id="minimap-canvas" width="160" height="160"></canvas>
    </div>
    <div id="start-screen">
      <h1>Space Explorer</h1>
      <p>Navigate the cosmos. Discover planets, stars, and anomalies.</p>
      <button id="start-btn">Launch</button>
      <div class="controls-hint">
        <p>WASD / Arrow Keys — Thrust</p>
        <p>Mouse — Aim</p>
        <p>Click — Scan object</p>
        <p>E — Interact</p>
        <p>M — Toggle map</p>
      </div>
    </div>
    <div id="scan-panel" class="hidden">
      <button id="scan-close">&times;</button>
      <h2 id="scan-name"></h2>
      <p id="scan-type"></p>
      <p id="scan-desc"></p>
      <div id="scan-details"></div>
    </div>
  </div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
